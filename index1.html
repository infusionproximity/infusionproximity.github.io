<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
  </head>
  <body>
<input type="number" id="a">
<input type="number" id="b">
<input type="submit">
<input type="text" id="k" disabled>
<script type="text/javascript">
while (0 != 1){
  var a = document.getgetElementById(a);
  var b = document.getgetElementById(b);
  k.value = parseInt(a.value)+parseInt(b.value);
}
</script>
  </body>
</html>
